<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PCS 风险预测</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel result-panel" aria-labelledby="title">
        <div>
          <p class="eyebrow">Post-cholecystectomy syndrome</p>
          <h1 id="title">PCS 风险预测</h1>
          <p class="subtitle">基于本项目随机森林模型的浏览器本地计算版本。</p>
        </div>

        <div class="risk-card">
          <div class="risk-topline">
            <span>预测概率</span>
            <strong id="riskValue">--</strong>
          </div>
          <div class="meter" aria-hidden="true">
            <span id="riskBar"></span>
          </div>
          <div class="risk-band" id="riskBand">请填写变量后计算</div>
        </div>

        <div class="metrics">
          <div>
            <span>模型</span>
            <strong>Random Forest</strong>
          </div>
          <div>
            <span>内部验证 AUC</span>
            <strong>0.917</strong>
          </div>
          <div>
            <span>样本量</span>
            <strong>311</strong>
          </div>
        </div>

        <p class="notice">仅用于科研展示和内部验证，不能替代临床诊断或治疗决策。正式应用前仍需外部验证、校准和伦理/隐私审查。</p>
      </section>

      <section class="panel form-panel">
        <div class="toolbar">
          <button class="button secondary" id="fillExample" type="button">示例</button>
          <button class="button secondary" id="resetForm" type="button">重置</button>
          <button class="button primary" id="predict" type="button">计算风险</button>
        </div>
        <form id="predictorForm" class="form-grid"></form>
      </section>
    </main>

    <script src="model.js"></script>
    <script src="app.js"></script>
  </body>
</html>
